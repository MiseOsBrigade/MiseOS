services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: miseos
      POSTGRES_PASSWORD: miseos
      POSTGRES_DB: miseos
    ports:
      - "5432:5432"
    volumes:
      - miseos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miseos -d miseos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  miseos-postgres:
