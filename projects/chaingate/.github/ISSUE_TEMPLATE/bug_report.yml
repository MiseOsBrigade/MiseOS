name: Bug report
description: Report a reproducible non-security defect
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Do not report vulnerabilities here. Follow SECURITY.md."
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, wallet, chain, browser, and relevant package versions. Remove secrets.
