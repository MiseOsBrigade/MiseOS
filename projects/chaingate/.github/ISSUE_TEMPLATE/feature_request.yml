name: Feature request
description: Propose a capability or improvement
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operational problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and trust impact
      description: Wallet authority, chains, contracts, identity, data, and failure modes.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
