name: Contracts
on:
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  push:
    branches: [main]
    paths:
      - "contracts/**"
permissions:
  contents: read
jobs:
  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge fmt --check
        working-directory: contracts/proof-registry
      - run: forge build
        working-directory: contracts/proof-registry
      - run: forge test -vvv
        working-directory: contracts/proof-registry
