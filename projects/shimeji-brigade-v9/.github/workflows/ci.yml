name: Shimeji Brigade CI
on:
  pull_request:
    paths:
      - 'projects/shimeji-brigade-v9/**'
  push:
    branches: [main]
    paths:
      - 'projects/shimeji-brigade-v9/**'
defaults:
  run:
    working-directory: projects/shimeji-brigade-v9
jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: projects/shimeji-brigade-v9/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm check
      - uses: actions/upload-artifact@v4
        with:
          name: shimeji-runtime-exports
          path: projects/shimeji-brigade-v9/exports/
