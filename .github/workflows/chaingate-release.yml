name: ChainGate Release

on:
  push:
    tags:
      - "chaingate-v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: projects/chaingate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - run: pnpm validate
      - name: Build release archive
        run: |
          tar -czf "../../miseos-chaingate-${GITHUB_REF_NAME}.tar.gz" \
            --exclude=node_modules \
            --exclude=.turbo \
            --exclude=dist \
            .
      - name: Generate checksum
        working-directory: .
        run: sha256sum "miseos-chaingate-${GITHUB_REF_NAME}.tar.gz" > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            miseos-chaingate-${{ github.ref_name }}.tar.gz
            SHA256SUMS
