name: Bootstrap MiseOS production repository

on:
  push:
    branches:
      - release/miseos-production-ecosystem
    paths:
      - '.bootstrap/**'
      - '.github/workflows/bootstrap-production-repo.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.bootstrap/**'
      - '.github/workflows/bootstrap-production-repo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release/miseos-production-ecosystem
          fetch-depth: 0

      - name: Diagnose staged archive
        shell: bash
        run: |
          set +e
          {
            echo "part sizes:"
            wc -c .bootstrap/release.part*
            echo "part git hashes:"
            git hash-object .bootstrap/release.part*
            cat .bootstrap/release.part* | tr -d '\n\r' > /tmp/release.b64
            echo "base64 chars: $(wc -c < /tmp/release.b64)"
            base64 --decode --ignore-garbage /tmp/release.b64 > /tmp/MiseOS-production-repo.zip 2>/tmp/base64.err
            echo "decode exit: $?"
            cat /tmp/base64.err
            echo "zip bytes: $(wc -c < /tmp/MiseOS-production-repo.zip)"
            echo "zip sha256: $(sha256sum /tmp/MiseOS-production-repo.zip | cut -d' ' -f1)"
            unzip -tq /tmp/MiseOS-production-repo.zip >/tmp/unzip.out 2>&1
            echo "unzip exit: $?"
            cat /tmp/unzip.out
          } > .bootstrap/diagnostics.txt
          cat .bootstrap/diagnostics.txt

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "miseos-release-bot"
          git config user.email "info.miseossystems@aol.com"
          git add .bootstrap/diagnostics.txt
          if ! git diff --cached --quiet; then
            git commit -m "chore(bootstrap): record archive diagnostics"
            git push origin HEAD:release/miseos-production-ecosystem
          fi
