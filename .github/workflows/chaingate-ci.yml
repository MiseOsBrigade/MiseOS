name: ChainGate CI

on:
  pull_request:
    paths:
      - "projects/chaingate/**"
      - ".github/workflows/chaingate-ci.yml"
  push:
    branches: [main]
    paths:
      - "projects/chaingate/**"
      - ".github/workflows/chaingate-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chaingate-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/chaingate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/chaingate/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm docs:check
